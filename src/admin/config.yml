backend:
  name: git-gateway
  branch: main

# Permite editar localmente sem GitHub (rodando: npm run cms)
local_backend: true

media_folder: "src/assets"
public_folder: "/assets"

# Idioma do painel
locale: "pt"

collections:
  - name: "conteudo"
    label: "Conteúdo do site"
    description: "Edite os textos e imagens da landing page."
    files:
      - name: "home"
        label: "Página inicial"
        file: "src/_data/site.json"
        editor:
          preview: false
        fields:
          # ── MENU ──
          - label: "Menu (topo)"
            name: "nav"
            widget: "object"
            fields:
              - label: "Links"
                name: "links"
                widget: "list"
                fields:
                  - { label: "Texto", name: "label", widget: "string" }
                  - { label: "Link (URL)", name: "url", widget: "string" }

          # ── HERO ──
          - label: "Topo (Hero)"
            name: "hero"
            widget: "object"
            fields:
              - { label: "Imagem de fundo", name: "image", widget: "image" }
              - { label: "Tag (pequeno, em cima)", name: "tag", widget: "string" }
              - { label: "Título principal", name: "headline", widget: "text", hint: "Use <br> para quebrar linha." }
              - { label: "Subtítulo", name: "sub", widget: "text" }
              - { label: "Texto do botão", name: "button_label", widget: "string" }
              - { label: "Link do botão", name: "button_url", widget: "string" }

          # ── PROBLEMA ──
          - label: "Seção: A ciência por trás do sono"
            name: "problema"
            widget: "object"
            fields:
              - { label: "Imagem de fundo", name: "image", widget: "image" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Título", name: "headline", widget: "text", hint: "Use <br> para quebrar linha." }
              - { label: "Subtítulo (frase em itálico)", name: "sub", widget: "text" }
              - { label: "Introdução", name: "intro", widget: "text" }
              - label: "Dados científicos (animados)"
                name: "bullets"
                widget: "list"
                summary: "{{fields.destaque}}"
                fields:
                  - { label: "Destaque (em negrito)", name: "destaque", widget: "string" }
                  - { label: "Complemento", name: "texto", widget: "string", required: false }
                  - { label: "Fonte (letra pequena embaixo)", name: "fonte", widget: "string", required: false }
              - { label: "Frase de fechamento", name: "fecho", widget: "text" }
              - { label: "Texto do botão e-book", name: "ebook_label", widget: "string", required: false, hint: "Deixe em branco para esconder o botão." }
              - { label: "Link do botão e-book (página do produto na Nuvemshop)", name: "ebook_url", widget: "string", required: false }

          # ── MELATONINA ──
          - label: "Produto 1: Melatonina"
            name: "melatonina"
            widget: "object"
            fields:
              - { label: "Vídeo", name: "video", widget: "file" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Título", name: "headline", widget: "text", hint: "Use <br> para quebrar linha; <em>texto</em> deixa em itálico." }
              - { label: "Descrição", name: "sub", widget: "text" }
              - { label: "Características", name: "specs", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
              - { label: "Texto do botão", name: "button_label", widget: "string" }
              - { label: "Link do botão (página do produto)", name: "button_url", widget: "string" }

          # ── MAGIC5 ──
          - label: "Produto 2: Magic5"
            name: "magic5"
            widget: "object"
            fields:
              - { label: "Vídeo", name: "video", widget: "file" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Título", name: "headline", widget: "text", hint: "Use <br> para quebrar linha; <em>texto</em> deixa em itálico." }
              - { label: "Descrição", name: "sub", widget: "text" }
              - { label: "Características", name: "specs", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
              - { label: "Texto do botão", name: "button_label", widget: "string" }
              - { label: "Link do botão (página do produto)", name: "button_url", widget: "string" }

          # ── KIT ──
          - label: "Seção: Kit Ritual"
            name: "kit"
            widget: "object"
            fields:
              - { label: "Imagem", name: "image", widget: "image" }
              - { label: "Tag", name: "tag", widget: "string" }
              - { label: "Título", name: "headline", widget: "text", hint: "Use <br> para quebrar linha." }
              - { label: "Subtítulo", name: "sub", widget: "text" }
              - { label: "Itens do kit", name: "items", widget: "list", field: { label: "Item", name: "item", widget: "string" } }
              - { label: "Texto do botão", name: "button_label", widget: "string" }
              - { label: "Link do botão", name: "button_url", widget: "string" }

          # ── DEPOIMENTOS ──
          - label: "Seção: Depoimentos"
            name: "depoimentos"
            widget: "object"
            fields:
              - { label: "Tag (repetida em cada depoimento)", name: "eyebrow", widget: "string" }
              - label: "Depoimentos"
                name: "slides"
                widget: "list"
                fields:
                  - { label: "Texto do depoimento", name: "quote", widget: "text" }
                  - { label: "Autor", name: "autor", widget: "string" }

          # ── CTA FINAL ──
          - label: "Seção final (Comece essa noite)"
            name: "cta"
            widget: "object"
            fields:
              - { label: "Título", name: "headline", widget: "text", hint: "Use <br> para quebrar linha." }
              - { label: "Subtítulo", name: "sub", widget: "string" }
              - label: "Cards de produto"
                name: "produtos"
                widget: "list"
                fields:
                  - { label: "Imagem", name: "image", widget: "image" }
                  - { label: "Nome", name: "name", widget: "string" }
                  - { label: "Texto do botão", name: "button_label", widget: "string" }
                  - { label: "Link do botão", name: "button_url", widget: "string" }
              - { label: "Selos (frete, parcelamento)", name: "info", widget: "list", field: { label: "Texto", name: "text", widget: "string" } }

          # ── RODAPÉ ──
          - label: "Rodapé"
            name: "footer"
            widget: "object"
            fields:
              - { label: "Logo", name: "logo", widget: "image" }
              - { label: "Label do contato", name: "contact_label", widget: "string" }
              - { label: "E-mail", name: "email", widget: "string" }
              - { label: "Telefone", name: "phone", widget: "string" }
              - { label: "Copyright", name: "copyright", widget: "string" }
              - { label: "Razão social", name: "razao_social", widget: "string" }
              - { label: "CNPJ", name: "cnpj", widget: "string" }
